name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt
      - run: cargo build --all-targets
      - name: cargo test
        shell: bash
        run: |
          set +e
          cargo test --all --no-fail-fast -- --nocapture 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            echo "== summary of failures =="
            # Only emit `::error::` annotations when a test actually failed,
            # since a single `::error::` command marks the whole step failed
            # in GitHub's UI even if the exit code is 0.
            grep -E '^test .+ \.\.\. FAILED$|^thread .+ panicked|^---- .+ stdout ----|^test result: FAILED' test-output.log | while IFS= read -r line; do
              clean=$(printf '%s' "$line" | sed 's/%/%25/g;s/\r/%0D/g')
              echo "::error::$clean"
            done
          fi
          exit $status
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo fmt --all -- --check
