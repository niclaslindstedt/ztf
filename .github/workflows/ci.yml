name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

# Default to no permissions — every job declares its own least-privilege
# scopes (OSS_SPEC §10.3).
permissions: {}

jobs:
  # Core build/test matrix. Per OSS_SPEC §9 CI invokes the `make` targets
  # directly so local and CI environments cannot drift.
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: make build
        run: make build
      - name: make test
        run: make test
        env:
          CARGO_INCREMENTAL: 0

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: make lint
        run: make lint

  fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt
      - name: make fmt-check
        run: make fmt-check

  # Lint workflow YAML with actionlint and shell scripts with
  # shellcheck. Catches invalid action pins, bad expressions,
  # quoting bugs, and SC-class issues in `scripts/*.sh` before
  # they hit `main`. (shellcheck is preinstalled on ubuntu-latest.)
  shell-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "${PWD}" >> "$GITHUB_PATH"
      - name: actionlint
        run: actionlint -color
      - name: make shellcheck
        run: make shellcheck
